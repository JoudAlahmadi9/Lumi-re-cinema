<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Lumière Cinema</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

  body{
      min-height:100vh;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
        url("background.jpg")center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .login-box{
      width:380px;
      padding:45px 40px;
      background:rgba(0,0,0,0.75);
      border-radius:10px;
      animation:fadeIn 0.6s ease;
    }

    .login-box h1{
      text-align:center;
      margin-bottom:25px;
      font-size:32px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:5px;
      background:#333;
      color:white;
      font-size:14px;
    }

    input::placeholder{
      color:#aaa;
    }

    input:focus{
      outline:none;
      border:1px solid #e50914;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:5px;
      background:#e50914;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#c40812;
      transform:scale(1.03);
    }

    .signup{
      margin-top:25px;
      text-align:center;
      color:#bbb;
    }

    .signup a{
      color:#e50914;
      font-weight:bold;
      text-decoration:none;
    }

    #signupMsg{
      margin-top:10px;
      text-align:center;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>Sign Up</h1>

    <form id="signupForm">
      <input type="text" id="signupName" placeholder="Full Name" required>
      <input type="email" id="signupEmail" placeholder="Email" required>
      <input type="password" id="signupPassword" placeholder="Password" required>

      <button type="submit">Create Account</button>

      <p id="signupMsg"></p>

      <div class="signup">
        <p>Already have an account?</p>
        <a href="login.html">Sign in now</a>
      </div>
    </form>
  </div>

  <script src="auth.js"></script>

</body>
</html>

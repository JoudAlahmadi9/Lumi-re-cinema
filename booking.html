<script>
  const confirmBtn = document.querySelector(".confirm-btn");

  confirmBtn.addEventListener("click", async function () {
    const userEmail = localStorage.getItem("userEmail") || "guest";

    if (!userEmail) {
      alert("You must login first");
      window.location.href = "login.html";
      return;
    }


    const date = document.querySelector(".booking-form input[type='date']").value;
const time = document.querySelector(".booking-form select").value;

const selectedSeats = Array.from(
  document.querySelectorAll(".seats input[type='checkbox']:checked")
).map(seat => seat.id);

if (!date || !time || selectedSeats.length === 0) {
  alert("Please select date, time, and seats");
  return;
}

    const res = await fetch("http://localhost:3000/book", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userEmail,
        movie: document.getElementById("title").textContent,
        date,
        time,
        seats: selectedSeats.join(", "),
        totalPrice: selectedSeats.length * 25
      })
    });

    const data = await res.json();

    if (data.success) {
  alert("Booking confirmed successfully 🎟️");

  window.location.href = "index.html";

} else {
  alert("Booking failed ❌");
}
  });
</script>
<script>
const params = new URLSearchParams(window.location.search);
const movieId = params.get("id");

fetch(`https://api.tvmaze.com/shows/${movieId}`)
  .then(res => res.json())
  .then(movie => {

    document.getElementById("title").textContent = movie.name;

    document.getElementById("image").src = movie.image?.medium;

    document.getElementById("desc").textContent =
      movie.summary
        ? movie.summary.replace(/<[^>]+>/g, "")
        : "No description";
    
    document.getElementById("genre").textContent =
      movie.genres.join(", ") + " | " +
      (movie.runtime ? movie.runtime + " min" : "N/A");

  });
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const dateInput = document.querySelector("input[type='date']");
  const timeSelect = document.querySelector("select");
  const seats = document.querySelector(".seats");

  if (!dateInput || !timeSelect || !seats) {
    console.log("❌ elements not found");
    return;
  }

  function enableSeats() {
    console.log("✅ triggered");

    if (dateInput.value && timeSelect.value) {
      seats.style.pointerEvents = "auto";
      seats.style.opacity = "1";
    }
  }

  function resetSeats() {
    document.querySelectorAll(".seats input:checked")
      .forEach(seat => seat.checked = false);
  }

  dateInput.addEventListener("change", () => {
    resetSeats();
    enableSeats();
  });

  timeSelect.addEventListener("change", () => {
    resetSeats();
    enableSeats();
  });

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const seats = document.querySelectorAll(".seats input");
  const totalPrice = document.getElementById("totalPrice");

  seats.forEach(seat => {
    seat.addEventListener("change", () => {

      const selectedSeats = document.querySelectorAll(".seats input:checked").length;

      totalPrice.textContent = "Total: " + (selectedSeats * 25) + " SAR";

    });
  });

});
</script>
